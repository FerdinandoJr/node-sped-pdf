<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Browser - Gerador DANFe</title>
    <style>
        * { box-sizing: border-box; } /* Garante que padding não quebre o layout */
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .controls {
            padding: 10px;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 40vh; /* Ajustado para dar espaço ao iframe */
        }

        textarea {
            flex-grow: 1;
            resize: none;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #ccc;
        }

        #container {
            height: 60vh;
            border-top: 2px solid #333;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <textarea id="xmlBruto" placeholder="Cole o XML da nota aqui..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button id="btnGerar" style="flex: 1;">Gerar DANFe</button>
            <button id="btnDacte" style="flex: 1; background: #28a745;">Gerar DACTE</button>
        </div>
    </div>

    <div id="container">
        <iframe id="meuIframe"></iframe>
    </div>

    <script type="module">
        import { DANFe, DACTE } from './src/index.ts';

        async function renderPDF(res) {
            const blob = new Blob([res], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            document.getElementById('meuIframe').src = url;
        }

        document.getElementById('btnGerar').addEventListener('click', async () => {
            const xml = document.getElementById('xmlBruto').value;
            if (!xml) return;
            try {
                const res = await DANFe({ xml });
                await renderPDF(res);
            } catch (err) {
                alert("Erro ao gerar DANFe: " + err.message);
                console.error(err);
            }
        });

        document.getElementById('btnDacte').addEventListener('click', async () => {
            const xml = document.getElementById('xmlBruto').value;
            if (!xml) return;
            try {
                const res = await DACTE({ xml });
                await renderPDF(res);
            } catch (err) {
                alert("Erro ao gerar DACTE: " + err.message);
                console.error(err);
            }
        });
    </script>
</body>
</html>
